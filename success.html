<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kòmand Konfime — Fèw Bèl</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: #FDF6F2; color: #2C1510; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { text-align: center; max-width: 500px; width: 100%; }
  .check { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; }
  .brand { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: #2C1510; margin-bottom: 2rem; }
  .brand em { font-style: italic; color: #7B3F8C; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 700; color: #C47E6E; margin-bottom: 1rem; line-height: 1.1; }
  .divider { width: 50px; height: 3px; background: #C47E6E; margin: 1.5rem auto; border-radius: 2px; }
  p { font-size: 0.92rem; font-weight: 300; color: #9B7060; line-height: 1.85; margin-bottom: 1rem; max-width: 380px; margin-left: auto; margin-right: auto; }
  .quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: #7B3F8C; margin: 1.5rem auto; }
  .back-btn { display: inline-block; margin-top: 2rem; background: #C47E6E; color: #fff; text-decoration: none; border-radius: 2rem; padding: 0.8rem 2.2rem; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; transition: background 0.2s; }
  .back-btn:hover { background: #D9998C; }
</style>
</head>
<body>
<div class="card">
  <span class="check">✿</span>
  <div class="brand">Fèw <em>Bèl</em></div>
  <h1>Kòmand ou konfime!</h1>
  <div class="divider"></div>
  <p>Mèsi pou kòmand ou. Ou pral resevwa yon imel konfirmasyon nan kèk minit.</p>
  <p>Pwodwi natirèl bote ayisyen an ap ekspedye depi Miami. Beauté naturelle, livre nan pòt ou.</p>
  <p class="quote">"Beauté natirèl, fanm ayisyen, tout kote." ✿</p>
  <a href="/" class="back-btn">← Tounen sou boutik la</a>
</div>
</body>
</html>
