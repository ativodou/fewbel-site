<title>Fèw Bèl — Bote Natirèl Ayisyen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FDF6F2; --blush: #F5E8E2; --blush-mid: #EDD5CB; --blush-border: rgba(196,126,110,0.18);
    --ink: #2C1510; --ink-mid: #4A2518; --ink-light: #6B3828;
    --violet: #7B3F8C; --violet-light: #9D5CAE; --violet-pale: rgba(123,63,140,0.08); --violet-border: rgba(123,63,140,0.2);
    --rose: #C47E6E; --rose-light: #D9998C; --rose-pale: rgba(196,126,110,0.08); --rose-border: rgba(196,126,110,0.2);
    --muted: #9B7060;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

  /* TOP BAR */
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 110; height: 34px; background: var(--ink); display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; }
  .topbar-tagline { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(253,246,242,0.45); }
  .topbar-back { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(253,246,242,0.45); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .topbar-back:hover { color: var(--rose-light); }
  .lang-toggle { display: flex; align-items: center; background: rgba(196,126,110,0.15); border-radius: 2rem; border: 1px solid var(--rose-border); overflow: hidden; }
  .lang-btn { padding: 0.25rem 0.8rem; cursor: pointer; border: none; background: none; color: rgba(253,246,242,0.45); font-family: 'Jost', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.2s, color 0.2s; }
  .lang-btn.active { background: var(--rose); color: #fff; border-radius: 2rem; }

  /* HEADER */
  header { position: fixed; top: 34px; left: 0; right: 0; z-index: 100; height: 110px; background: #fff; border-bottom: 2px solid var(--rose); display: grid; grid-template-columns: 160px 1fr 280px; box-shadow: 0 2px 20px rgba(44,21,16,0.06); }
  .header-logo-slot { display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .header-logo-img { height: 96px; object-fit: contain; }
  .header-brand { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; padding: 1rem 2rem; }
  .header-site-name { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3.5vw, 3rem); font-weight: 700; line-height: 1; color: var(--ink); letter-spacing: 0.03em; }
  .header-site-name span { color: var(--violet); font-style: italic; }
  .header-nav-links { display: flex; gap: 2rem; list-style: none; }
  .header-nav-links a { text-decoration: none; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
  .header-nav-links a:hover { color: var(--violet); }
  .header-actions { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.85rem; padding: 1rem 2rem; }
  .cart-btn { background: var(--rose); color: #fff; border: none; border-radius: 2rem; padding: 0.6rem 1.5rem; font-family: 'Jost', sans-serif; font-size: 0.76rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.15s; display: flex; align-items: center; gap: 0.5rem; }
  .cart-btn:hover { background: var(--rose-light); transform: translateY(-1px); }
  .cart-count { background: var(--ink); color: var(--cream); border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .header-spacer { height: 144px; }

  /* STRIP */
  .strip { background: var(--violet); padding: 0.5rem 0; overflow: hidden; white-space: nowrap; }
  .strip-inner { display: inline-block; animation: marquee 30s linear infinite; }
  .strip-inner span { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.85); padding: 0 2rem; }

  /* HERO */
  .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 88vh; }
  .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 5rem; background: radial-gradient(ellipse at 30% 50%, rgba(123,63,140,0.05) 0%, transparent 70%); }
  .hero-kicker { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--violet); margin-bottom: 1.5rem; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 5.5vw, 5rem); font-weight: 900; line-height: 0.95; color: var(--ink); margin-bottom: 1.5rem; }
  .hero-title em { font-style: italic; color: var(--rose); display: block; }
  .hero-desc { font-size: 0.95rem; font-weight: 300; color: var(--ink-light); line-height: 1.85; margin-bottom: 2.5rem; max-width: 420px; }
  .hero-cta { display: inline-flex; align-items: center; gap: 0.75rem; background: var(--rose); color: #fff; border: none; border-radius: 2rem; padding: 0.85rem 2rem; font-family: 'Jost', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.15s; }
  .hero-cta:hover { background: var(--rose-light); transform: translateY(-2px); }
  .hero-right { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); background: var(--blush); }
  .product-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem; cursor: pointer; transition: background 0.25s; border: 1px solid rgba(196,126,110,0.12); }
  .product-tile:hover { background: rgba(123,63,140,0.06); }
  .tile-symbol { font-size: 2.5rem; color: var(--rose); opacity: 0.7; }
  .tile-name { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; color: var(--ink); text-align: center; }
  .tile-sub { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-align: center; }

  /* PRODUCTS */
  section { padding: 5rem; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 3rem; border-bottom: 1px solid var(--rose-border); padding-bottom: 1.5rem; }
  .section-head h2 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 3.5vw, 3rem); font-weight: 700; color: var(--ink); line-height: 1; }
  .section-head h2 .accent { color: var(--violet); font-style: italic; }
  .section-kicker { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
  .product-card { background: #fff; border: 1px solid var(--blush-border); overflow: hidden; transition: transform 0.25s, box-shadow 0.25s, border-color 0.3s; border-radius: 2px; }
  .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(123,63,140,0.1); border-color: rgba(123,63,140,0.3); }
  .product-img { height: 240px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; background: var(--blush); position: relative; overflow: hidden; }
  .product-img-symbol { font-size: 2rem; color: var(--rose); opacity: 0.5; }
  .product-img-glow { width: 100%; height: 100%; object-fit: cover; object-position: center top; opacity: 0.92; }
  .product-badge { position: absolute; top: 0.75rem; right: 0.75rem; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; padding: 0.25rem 0.6rem; border-radius: 2rem; }
  .badge-new { background: var(--violet); color: #fff; }
  .badge-hot { background: #C0392B; color: #fff; }
  .badge-bs { background: rgba(123,63,140,0.12); color: var(--violet); border: 1px solid var(--violet-border); }
  .product-body { padding: 1.25rem; }
  .product-brand-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .product-brand-tag { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--violet); opacity: 0.7; font-weight: 600; }
  .product-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--ink); margin-bottom: 0.3rem; line-height: 1.1; }
  .product-sub { font-size: 0.78rem; font-weight: 300; color: var(--muted); margin-bottom: 0.6rem; font-style: italic; }
  .product-desc { font-size: 0.8rem; color: var(--ink-light); line-height: 1.65; margin-bottom: 0.75rem; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--blush-border); padding-top: 1rem; }
  .product-price { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--rose); }
  .product-price small { font-size: 0.8rem; color: var(--muted); font-weight: 300; font-family: 'Jost', sans-serif; }
  .add-btn { background: var(--rose); color: #fff; border: none; border-radius: 2rem; padding: 0.5rem 1.2rem; font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.18s, transform 0.15s; }
  .add-btn:hover { background: var(--rose-light); transform: scale(1.04); }
  .add-btn.added { background: var(--violet); }

  /* FEATURES */
  .features { background: var(--ink); padding: 4rem 5rem; }
  .features-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; max-width: 1200px; margin: 0 auto; }
  .feature-item { text-align: center; }
  .feature-icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
  .feature-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--rose-light); margin-bottom: 0.3rem; }
  .feature-desc { font-size: 0.8rem; font-weight: 300; color: rgba(253,246,242,0.5); line-height: 1.65; }

  /* STORY */
  .story { display: grid; grid-template-columns: 1fr 1fr; padding: 0; background: var(--blush); }
  .story-img { background: radial-gradient(ellipse at center, #D9998C, #C47E6E 50%, #B56454); min-height: 480px; display: flex; align-items: center; justify-content: center; font-size: 7rem; position: relative; overflow: hidden; border-right: 1px solid var(--rose-border); }
  .story-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, transparent 60%, var(--blush)); }
  .story-text { padding: 5rem 4rem; display: flex; flex-direction: column; justify-content: center; }
  .story-text .section-kicker { margin-bottom: 1rem; display: block; }
  .story-text h2 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 700; color: var(--ink); line-height: 1.15; margin-bottom: 1.5rem; }
  .story-text h2 em { font-style: italic; color: var(--violet); }
  .story-text p { font-size: 0.92rem; font-weight: 300; color: var(--ink-mid); line-height: 1.85; margin-bottom: 1rem; max-width: 440px; }

  /* DR. SECTION */
  .dr-section { background: var(--ink-mid); display: grid; grid-template-columns: 380px 1fr; min-height: 520px; overflow: hidden; border-top: 2px solid var(--rose-border); }
  .dr-visual { background: radial-gradient(ellipse at 40% 60%, #7B3F8C, #4A2518 60%, #2C1510); display: flex; align-items: flex-end; justify-content: center; position: relative; overflow: hidden; padding-top: 3rem; }
  .dr-visual::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C47E6E' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20' fill='none' stroke='%23C47E6E' stroke-width='1'/%3E%3Ccircle cx='30' cy='30' r='10' fill='none' stroke='%23C47E6E' stroke-width='0.5'/%3E%3C/g%3E%3C/svg%3E"); }
  .dr-avatar-wrap { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
  .dr-avatar-initials { width: 260px; height: 260px; border-radius: 50%; border: 4px solid var(--rose); object-fit: cover; object-position: center top; box-shadow: 0 0 0 8px rgba(196,126,110,0.12), 0 0 0 16px rgba(196,126,110,0.05); }
  .dr-badge-seal { position: absolute; bottom: -10px; right: -10px; width: 76px; height: 76px; background: var(--rose); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 3px solid var(--ink-mid); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .seal-icon { font-size: 1rem; }
  .seal-text { font-size: 0.38rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; line-height: 1.2; padding: 0 4px; }
  .dr-ribbon { background: var(--rose); color: #fff; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; padding: 0.4rem 2.2rem; margin-top: 1.5rem; position: relative; z-index: 2; clip-path: polygon(8px 0%, calc(100% - 8px) 0%, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0% 50%); }
  .dr-content { padding: 4rem 4.5rem; display: flex; flex-direction: column; justify-content: center; }
  .dr-kicker { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--rose-light); font-weight: 500; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem; }
  .dr-kicker::before { content: ''; display: inline-block; width: 28px; height: 1px; background: var(--rose); }
  .dr-name { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 700; color: var(--cream); line-height: 0.95; margin-bottom: 0.5rem; }
  .dr-name em { font-style: italic; color: var(--rose-light); }
  .dr-title-tag { display: inline-flex; align-items: center; background: rgba(196,126,110,0.15); border: 1px solid var(--rose-border); border-radius: 2rem; padding: 0.35rem 1rem; font-size: 0.72rem; font-weight: 500; color: var(--rose-light); letter-spacing: 0.06em; margin-bottom: 2rem; width: fit-content; }
  .dr-bio { font-size: 0.92rem; font-weight: 300; color: rgba(253,246,242,0.7); line-height: 1.85; margin-bottom: 1rem; max-width: 500px; }
  .dr-quote { border-left: 3px solid var(--rose); padding-left: 1.25rem; margin: 1.75rem 0; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: var(--cream); line-height: 1.5; max-width: 440px; }
  .dr-stats { display: flex; gap: 2.5rem; margin-top: 0.5rem; }
  .dr-stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--rose-light); display: block; line-height: 1; margin-bottom: 0.2rem; }
  .dr-stat-label { font-size: 0.68rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(253,246,242,0.4); }

  /* TESTIMONIALS */
  .testimonials { background: var(--cream); }
  .testimonial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .testimonial-card { background: #fff; border: 1px solid var(--blush-border); padding: 1.75rem; position: relative; transition: border-color 0.3s; border-radius: 2px; }
  .testimonial-card:hover { border-color: rgba(123,63,140,0.3); }
  .testimonial-card::before { content: '\201C'; font-family: 'Playfair Display', serif; font-size: 5rem; color: rgba(196,126,110,0.1); position: absolute; top: 0.5rem; left: 1rem; line-height: 1; }
  .testimonial-text { font-size: 0.88rem; color: var(--ink-light); line-height: 1.75; margin-bottom: 1.25rem; padding-top: 2rem; font-style: italic; }
  .testimonial-author { display: flex; align-items: center; gap: 0.75rem; }
  .author-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; color: #fff; background: var(--violet); flex-shrink: 0; }
  .author-name { font-size: 0.82rem; font-weight: 600; color: var(--ink); }
  .author-loc { font-size: 0.72rem; color: var(--muted); }
  .stars { color: var(--rose); font-size: 0.7rem; }

  /* FOOTER */
  footer { background: var(--ink); padding: 4rem 5rem 2rem; color: rgba(253,246,242,0.4); border-top: 2px solid var(--rose-border); }
  .footer-top { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
  .footer-brand-name { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--rose-light); display: block; margin-bottom: 1rem; }
  .footer-brand-name em { font-style: italic; }
  .footer-brand p { font-size: 0.82rem; font-weight: 300; line-height: 1.75; max-width: 280px; }
  .footer-col h4 { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose-light); font-weight: 600; margin-bottom: 1.2rem; }
  .footer-col ul { list-style: none; }
  .footer-col ul li { font-size: 0.82rem; margin-bottom: 0.6rem; cursor: pointer; transition: color 0.2s; }
  .footer-col ul li:hover { color: var(--cream); }
  .footer-bottom { border-top: 1px solid rgba(196,126,110,0.15); padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  .footer-bottom p { font-size: 0.75rem; }

  /* CART */
  .cart-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(44,21,16,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-panel { position: fixed; top: 0; right: 0; bottom: 0; z-index: 201; width: 420px; background: #fff; transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; border-left: 2px solid var(--rose-border); }
  .cart-panel.open { transform: translateX(0); }
  .cart-header { padding: 1.5rem 1.75rem; border-bottom: 1px solid var(--blush-border); display: flex; align-items: center; justify-content: space-between; }
  .cart-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--rose); }
  .close-cart { background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--muted); transition: color 0.2s; line-height: 1; }
  .close-cart:hover { color: var(--rose); }
  .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.75rem; }
  .cart-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; color: var(--muted); }
  .cart-empty span { font-size: 3rem; opacity: 0.4; }
  .cart-empty p { font-size: 0.9rem; font-weight: 300; font-style: italic; }
  .cart-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--blush-border); }
  .cart-item-icon { width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; background: var(--blush); flex-shrink: 0; color: var(--rose); }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 0.15rem; }
  .cart-item-qty { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
  .qty-btn { width: 22px; height: 22px; background: var(--blush); border: 1px solid var(--blush-border); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--rose); font-weight: 600; transition: background 0.15s; }
  .qty-btn:hover { background: var(--blush-mid); }
  .qty-num { font-size: 0.85rem; font-weight: 500; min-width: 18px; text-align: center; color: var(--ink); }
  .cart-item-price { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--rose); flex-shrink: 0; }
  .remove-item { background: none; border: none; cursor: pointer; color: rgba(196,126,110,0.4); font-size: 1rem; transition: color 0.2s; padding: 0.25rem; }
  .remove-item:hover { color: #C0392B; }
  .cart-footer { padding: 1.25rem 1.75rem; border-top: 1px solid var(--blush-border); background: var(--blush); }
  .cart-sub-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
  .cart-sub-row span { font-size: 0.8rem; color: var(--muted); }
  .cart-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--blush-border); }
  .cart-total-row strong { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--ink); }
  .total-price { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 700; color: var(--rose); }

  { id:1, name:'Lwil Maskreti', sub_ht:'Lwil Botanik Pou Po ak Cheve', sub_en:'Botanical Oil for Skin & Hair', price:24.99, badge:'bs', symbol:'❋', desc_ht:'Lwil maskreti pou po: nouri cheve, pwoteje po ak eklesite tach. Rich an asid grasi esansyèl pou po ou.', desc_en:'Pure Haitian castor oil: nourishes hair, protects skin, and fades dark spots. Rich in essential fatty acids for your skin.' },
  { id:2, name:'Bè Karite', sub_ht:'Bè Nouri Kò ak Figi', sub_en:'Body & Face Nourishing Butter', price:19.99, badge:'bs', symbol:'✿', desc_ht:'Bè karite natirèl ki nouri po ak pwofondè. Ideyal pou kote sèch, bra, jann pye, ak pou gwosès.', desc_en:'Natural shea butter that deeply nourishes skin. Ideal for dry areas, elbows, heels, and during pregnancy.' },
  { id:3, name:'Masque Bentonite', sub_ht:'Masque Ajil Pou Figi', sub_en:'Clay Detox Face Mask', price:22.99, badge:'new', symbol:'◆', desc_ht:'Masque ajil bentonit ki netwaye po an pwofondè, retire impirete ak kontwole lwil ekstra. Pou tout kalite po.', desc_en:'Bentonite clay mask that deeply cleanses skin, removes impurities, and controls excess oil. For all skin types.' },
  { id:4, name:'Lwil Kokoye', sub_ht:'Lwil Kokoye Natirèl', sub_en:'Pure Coconut Oil', price:18.99, badge:'', symbol:'◉', desc_ht:'Lwil kokoye vyèj ekstra ki ideyalman pou po, cheve ak kòm démaquillant natirèl. Yon sèl pwodwi, mil itilizasyon.', desc_en:'Extra virgin coconut oil ideal for skin, hair, and as a natural makeup remover. One product, a thousand uses.' },
  { id:5, name:'Savon Natirèl', sub_ht:'Savon Botanik Ayisyen', sub_en:'Haitian Botanical Soap', price:12.99, badge:'', symbol:'✦', desc_ht:'Savon fèt a la men ak lwil botanik ayisyen. San sulfat, san paraben. Dousi po tout jou san sèchès.', desc_en:'Handcrafted soap with Haitian botanical oils. Sulfate-free, paraben-free. Softens skin daily without dryness.' },
  { id:6, name:'Masque Chevè', sub_ht:'Swen Pwofon Pou Cheve', sub_en:'Deep Hair Treatment Mask', price:26.99, badge:'new', symbol:'≋', desc_ht:'Masque swen pwofon pou cheve: rannovi cheve kraze, nouri tèt, bay byè ak briyans natirèl. Ideyal pou cheve kreyòl.', desc_en:'Deep conditioning hair mask: revives damaged hair, nourishes the scalp, restores moisture and natural shine. Ideal for textured hair.' },
];

let cart = [], lang = 'ht';

function t(k) { return (T[lang]||T.ht)[k] || k; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === (l==='ht'?'KR':'EN')));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n, v = t(k);
    if (k === 'story.title') el.innerHTML = v; else el.textContent = v;
  });
  renderProducts(); renderStrip(); updateCartUI();
}

function renderStrip() {
  const items = t('strip'); const s = items.map(i=>`<span>${i}</span>`).join('');
  document.getElementById('strip-inner').innerHTML = s+s;
}

function renderProducts() {
  const g = document.getElementById('product-grid');
  g.innerHTML = PRODUCTS.map(p => {
    const badgeMap = {'new':'badge-new','hot':'badge-hot','bs':'badge-bs'};
    const badgeLabel = p.badge ? `<div class="product-badge ${badgeMap[p.badge]||''}">${t('badge.'+p.badge)}</div>` : '';
    return `<div class="product-card">
      <div class="product-img">
        <img class="product-img-glow" src="images/glow.png" alt="Glow">
        <span class="product-img-symbol" style="position:absolute;bottom:0.5rem;left:0.75rem;">${p.symbol}</span>
        ${badgeLabel}
      </div>
      <div class="product-body">
        <div class="product-brand-row">
          <img src="images/few-bel-v2.png" style="height:22px;object-fit:contain;opacity:0.7;">
          <span class="product-brand-tag">Fèw Bèl</span>
        </div>
        <div class="product-name">${p.name}</div>
        <div class="product-sub">${lang==='ht'?p.sub_ht:p.sub_en}</div>
        <div class="product-desc">${lang==='ht'?p.desc_ht:p.desc_en}</div>
        <div class="product-footer">
          <div class="product-price">$${p.price.toFixed(2)} <small>${t('p.unit')}</small></div>
          <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">${t('p.add')}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const tiles = document.getElementById('product-tiles');
  if (tiles) tiles.innerHTML = PRODUCTS.map(p => `
    <div class="product-tile" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
      <span class="tile-symbol">${p.symbol}</span>
      <span class="tile-name">${p.name}</span>
      <span class="tile-sub">${lang==='ht'?p.sub_ht:p.sub_en}</span>
    </div>`).join('');
}

function addToCart(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  const ex = cart.find(x=>x.id===id);
  if (ex) ex.qty++; else cart.push({...p, qty:1});
  updateCartUI();
  const btn = document.getElementById('btn-'+id);
  btn.textContent = t('p.added'); btn.classList.add('added');
  setTimeout(()=>{ btn.textContent=t('p.add'); btn.classList.remove('added'); }, 1500);
  showToast(p.name + ' ' + t('toast'));
}

function showToast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

function toggleCart() {
  document.getElementById('cart-overlay').classList.toggle('open');
  document.getElementById('cart-panel').classList.toggle('open');
}

function updateCartUI() {
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('cart-count').textContent = cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cart-title-el').textContent = t('cart.title');
  document.getElementById('cart-empty-el').textContent = t('cart.empty');
  document.getElementById('cart-sub-label').textContent = t('cart.sub');
  document.getElementById('cart-ship-label').textContent = t('cart.ship');
  document.getElementById('cart-free-label').textContent = t('cart.free');
  document.getElementById('cart-total-label').textContent = t('cart.total');
  document.getElementById('cart-sub-val').textContent = '$'+total.toFixed(2);
  document.getElementById('cart-total-val').textContent = '$'+total.toFixed(2);
  document.getElementById('checkout-btn-el').textContent = t('cart.checkout');
  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');
  if (cart.length === 0) {
    list.innerHTML = `<div class="cart-empty"><span>✿</span><p>${t('cart.empty')}</p></div>`;
    footer.style.display = 'none';
  } else {
    footer.style.display = 'block';
    list.innerHTML = cart.map(i=>`
      <div class="cart-item">
        <div class="cart-item-icon">${i.symbol}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name}</div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
            <span class="qty-num">${i.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
          </div>
        </div>
        <span class="cart-item-price">$${(i.price*i.qty).toFixed(2)}</span>
        <button class="remove-item" onclick="removeFromCart(${i.id})">✕</button>
      </div>`).join('');
  }
}

function changeQty(id, d) {
  const i = cart.find(x=>x.id===id);
  if (!i) return;
  i.qty += d;
  if (i.qty <= 0) cart = cart.filter(x=>x.id!==id);
  updateCartUI();
}

function removeFromCart(id) { cart = cart.filter(x=>x.id!==id); updateCartUI(); }

function toggleMobileMenu() {
  document.getElementById('mobile-menu').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}

document.addEventListener('DOMContentLoaded', () => { setLang('ht'); });
</script>
</body>
</html>
